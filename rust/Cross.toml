# Cross-compilation configuration for `cross`.
#
# `unarc-rs` (and its `unrar` dependency) compiles C++ code, so the build
# container needs a C++ toolchain and libstdc++ headers.
[build]
pre-build = [
    "apt-get update && apt-get install -y build-essential g++",
]

[target.x86_64-unknown-linux-musl]
image = "ghcr.io/cross-rs/x86_64-unknown-linux-musl:main"

[target.aarch64-unknown-linux-musl]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-musl:main"
