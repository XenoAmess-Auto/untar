name: Release

on:
  push:
    branches: [master, main]
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [master, main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux binaries (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cross
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cross
            ~/.cargo/git
          key: ${{ runner.os }}-cross-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cross-

      - name: Install cross
        run: cargo install cross

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./rust

      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }}
        working-directory: ./rust

      - name: Package tar.gz
        run: |
          cd rust/target/${{ matrix.target }}/release
          tar czvf ../../../untar-${{ matrix.target }}.tar.gz untar
          cd ../../..

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: untar-${{ matrix.target }}
          path: rust/target/${{ matrix.target }}/release/untar

      - name: Upload tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: untar-${{ matrix.target }}-tar
          path: rust/untar-${{ matrix.target }}.tar.gz

  build-windows:
    name: Build Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./rust

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: ./rust

      - name: Cache cargo-wix
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-wix
          key: ${{ runner.os }}-cargo-wix-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-wix-

      - name: Install cargo-wix
        run: cargo install cargo-wix

      - name: Build MSI
        run: cargo wix
        working-directory: ./rust

      - name: Package zip
        run: |
          cd rust/target/x86_64-pc-windows-msvc/release
          7z a -tzip ..\..\..\untar-x86_64-windows.zip untar.exe
        shell: pwsh

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: untar-x86_64-windows-msi
          path: rust/target/wix/*.msi

      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: untar-x86_64-windows-zip
          path: rust/untar-x86_64-windows.zip

  generate-extras:
    name: Generate shell completions and man page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./rust

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config liblzma-dev

      - name: Build binary
        run: cargo build --release
        working-directory: ./rust

      - name: Collect extras
        run: |
          OUT_DIR=$(find rust/target/release/build -type d -name out | grep untar | head -n1)
          mkdir -p extras/completions extras/man
          cp "$OUT_DIR/completions"/* extras/completions/
          cp "$OUT_DIR/man"/* extras/man/

      - name: Upload extras
        uses: actions/upload-artifact@v4
        with:
          name: untar-extras
          path: extras/**/*

  linux-packages:
    name: Build Linux packages (${{ matrix.arch }})
    needs: build-linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Download binary
        uses: actions/download-artifact@v4
        with:
          name: untar-${{ matrix.target }}
          path: ./bin

      - name: Make binary executable
        run: chmod +x ./bin/untar

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version' rust/Cargo.toml | head -1 | sed 's/.*= *"\([^"]*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Cache nfpm
        uses: actions/cache@v4
        with:
          path: ~/go/bin/nfpm
          key: ${{ runner.os }}-nfpm
          restore-keys: |
            ${{ runner.os }}-nfpm

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
          echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Set arch variables
        id: arch_vars
        run: |
          if [ "${{ matrix.arch }}" = "amd64" ]; then
            echo "rpm_arch=x86_64" >> "$GITHUB_OUTPUT"
            echo "apk_arch=x86_64" >> "$GITHUB_OUTPUT"
            echo "arch_arch=x86_64" >> "$GITHUB_OUTPUT"
          else
            echo "rpm_arch=aarch64" >> "$GITHUB_OUTPUT"
            echo "apk_arch=aarch64" >> "$GITHUB_OUTPUT"
            echo "arch_arch=aarch64" >> "$GITHUB_OUTPUT"
          fi

      - name: Build packages
        env:
          VERSION: ${{ steps.version.outputs.version }}
          ARCH: ${{ matrix.arch }}
        run: |
          nfpm package -p deb -f nfpm.yaml -t "untar_${VERSION}_${ARCH}.deb"
          nfpm package -p rpm -f nfpm.yaml -t "untar-${VERSION}-1.${{ steps.arch_vars.outputs.rpm_arch }}.rpm"
          nfpm package -p apk -f nfpm.yaml -t "untar-${VERSION}-${{ steps.arch_vars.outputs.apk_arch }}.apk"
          nfpm package -p archlinux -f nfpm.yaml -t "untar-${VERSION}-1-${{ steps.arch_vars.outputs.arch_arch }}.pkg.tar.zst"

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: untar-linux-packages-${{ matrix.arch }}
          path: |
            untar_${{ steps.version.outputs.version }}_${{ matrix.arch }}.deb
            untar-${{ steps.version.outputs.version }}-1.${{ steps.arch_vars.outputs.rpm_arch }}.rpm
            untar-${{ steps.version.outputs.version }}-${{ steps.arch_vars.outputs.apk_arch }}.apk
            untar-${{ steps.version.outputs.version }}-1-${{ steps.arch_vars.outputs.arch_arch }}.pkg.tar.zst

  release:
    name: Create Release
    needs: [build-linux, build-windows, linux-packages, generate-extras]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f -exec sha256sum {} + > ../sha256sums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
            sha256sums.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
